<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Drive Assist - Login</title>

    <!-- Bootstrap 5 -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <style>
        body {
            min-height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #0f9d94 50%, #dcdcdc 50%);
        }

        .login-wrapper {
            min-height: 100vh;
        }

        .login-card {
            width: 100%;
            max-width: 340px;
            background: #f7f7f7;
            padding: 28px 36px 32px;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.18);
            border-radius: 2px;
        }

        .brand-icon {
            font-size: 42px;
            color: #0f9d94;
            line-height: 1;
        }

        .brand-title {
            font-size: 20px;
            font-weight: 700;
            color: #111;
            margin-bottom: 2px;
        }

        .brand-subtitle {
            font-size: 10px;
            color: #555;
            margin-bottom: 0;
        }

        .form-label-custom {
            font-size: 12px;
            font-weight: 700;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .form-control-custom {
            height: 34px;
            border-radius: 2px;
            border: 1px solid #c8c8c8;
            font-size: 14px;
            color: #333;
        }

        .form-control-custom:focus {
            border-color: #0f9d94;
            box-shadow: none;
        }

        .forgot-link {
            color: #0f9d94;
            font-size: 13px;
            text-decoration: none;
        }

        .forgot-link:hover {
            text-decoration: underline;
            color: #0c857d;
        }

        .btn-login {
            background-color: #0f9d94;
            border: none;
            border-radius: 2px;
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            padding: 6px 12px;
        }

        .btn-login:hover {
            background-color: #0c857d;
        }

        hr {
            border-color: #cfcfcf;
            opacity: 1;
        }

        @media (max-width: 576px) {
            .login-card {
                margin: 20px;
                padding: 24px 22px 28px;
            }
        }
    </style>
</head>
<body>
    <div class="container-fluid login-wrapper d-flex align-items-center justify-content-center">
        <div class="login-card">
            <div class="text-center mb-3">
                <div class="brand-icon mb-2">
                    <i class="fas fa-car-side"></i>
                </div>
                <h1 class="brand-title">Smart Drive Assist</h1>
                <p class="brand-subtitle">Safer journeys through intelligent assistance</p>
            </div>

            <hr class="my-3">

        <form class="login-form" action="index.html">
                <div class="mb-3">
                    <label for="username" class="form-label form-label-custom">Username</label>
                    <input
                        type="text"
                        class="form-control form-control-custom"
                        id="username"
                        name="username"
                        placeholder="Username"
                        required
                    >
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label form-label-custom">Password</label>
                    <input
                        type="password"
                        class="form-control form-control-custom"
                        id="password"
                        name="password"
                        placeholder="Password"
                        required
                    >
                </div>

                <div class="mb-3">
                    <a href="#" class="forgot-link">Forgot Password?</a>
                </div>

                <button type="submit" class="btn btn-login text-white w-100">
                    <i class="fas fa-sign-in-alt me-2"></i>Sign In
                </button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
